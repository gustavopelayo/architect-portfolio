<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Daniel Moura{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ settings.get('logo_path', '/static/logo.png') }}">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="{{ settings.get('logo_path', '/static/logo.png') }}" alt="" class="logo-icon">
                Daniel Moura
            </a>
            <ul class="nav-links">
                <li><a href="/about">About</a></li>
                <li><a href="/portfolio">Portfolio</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Daniel Moura</p>
    </footer>
</body>
</html>

<style>
.cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: multiply;
    opacity: 0;
}

.cursor-ring {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s;
    opacity: 0;
    mix-blend-mode: multiply;
}

.cursor-dot.visible, .cursor-ring.visible { opacity: 1; }
.cursor-dot.click { width: 4px; height: 4px; }
.cursor-ring.click { width: 20px; height: 20px; border-color: var(--text); }

@media (pointer: coarse) {
    .cursor-dot, .cursor-ring { display: none; }
}
</style>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
(function() {
    var dot = document.getElementById('cursorDot');
    var ring = document.getElementById('cursorRing');
    var mx = 0, my = 0;
    var ringX = 0, ringY = 0;

    document.addEventListener('mousemove', function(e) {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
        dot.classList.add('visible');
        ring.classList.add('visible');
    });

    document.addEventListener('mouseleave', function() {
        dot.classList.remove('visible');
        ring.classList.remove('visible');
    });

    document.addEventListener('mousedown', function() {
        dot.classList.add('click');
        ring.classList.add('click');
    });

    document.addEventListener('mouseup', function() {
        dot.classList.remove('click');
        ring.classList.remove('click');
    });

    function animate() {
        ringX += (mx - ringX) * 0.12;
        ringY += (my - ringY) * 0.12;
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>
